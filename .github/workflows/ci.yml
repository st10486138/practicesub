name: CI - Build WPF Chatbot

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # WPF (UseWPF=true) requires the Windows desktop targeting pack,
    # so this job must run on a Windows runner.
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore WpfApp2/WpfApp2.slnx

      - name: Build solution
        run: dotnet build WpfApp2/WpfApp2.slnx --no-restore --configuration Release
